<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yoxtellar</title>
  <!-- Adobe Fonts: use.typekit.net のコードをここに入れる -->
  <!-- <link rel="stylesheet" href="https://use.typekit.net/XXXXXXX.css"> -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  </head>
<body>

  <header>
      <a class="logo" href="index.html">yoxtellar</a>
      <nav>
            <a href="index.html" id="nav-works">works</a>
            <a href="profile.html" id="nav-profile">profile</a>
            <a href="contact.html" id="nav-contact">contact</a>
      </nav>
  </header>

  <main>
      <div class="filters">
            <button class="filter-btn active" data-filter="all">all</button>
            <button class="filter-btn" data-filter="composer">composer</button>
            <button class="filter-btn" data-filter="live">live</button>
            <button class="filter-btn" data-filter="release">release</button>
            <button class="filter-btn" data-filter="vr-metaverse">vr / metaverse</button>
            <button class="filter-btn" data-filter="other">other</button>
      </div>
      <div class="grid" id="worksGrid"></div>
  </main>

  <footer>
      <span>&copy; yoxtellar</span>
    <div class="social-links">
        <a href="#">tw</a>
        <a href="#">sc</a>
        <a href="#">bc</a>
    </div>
  </footer>

<script>
  fetch('works.json')
    .then(function(r) { return r.json(); })
    .then(function(works) {
        
        // 日付で新しい順（降順）に並び替える処理
        works.sort(function(a, b) {
            var timeA = a.date ? new Date(a.date.replace(/\./g, '/')).getTime() : 0;
            var timeB = b.date ? new Date(b.date.replace(/\./g, '/')).getTime() : 0;
            return timeB - timeA;
        });

        var grid = document.getElementById('worksGrid');
        works.forEach(function(w, i) {
            
            // ▼▼▼ 複数タグ対応の魔法 ▼▼▼
            // データが配列じゃない場合（従来の書き方）も自動で配列に変換してエラーを防ぎます
            var tagArray = Array.isArray(w.tag) ? w.tag : [w.tag];
            
            // 画面表示用（例: "composer, vr / metaverse" のようにカンマ区切りで表示）
            var tagLabel = tagArray.map(function(t) { return t.replace('-', ' / '); }).join(', ');
            // ▲▲▲ ここまで ▲▲▲

            var dateHtml = w.date ? '<div class="work-date">' + w.date + '</div>' : '';

            var defaultImg = 'assets/images/default.jpg';
            var thumbSrc = w.thumb ? w.thumb : defaultImg;

            var inner = '<div class="thumb-wrap"><img src="' + thumbSrc + '" onerror="this.src=\'' + defaultImg + '\'" alt="' + w.title + '" loading="lazy"><div class="work-overlay"><span class="overlay-arrow">&rarr;</span></div></div><div class="work-info"><div class="work-meta"><span class="work-tag">' + tagLabel + '</span>' + dateHtml + '</div><div class="work-title">' + w.title + '</div></div>';

            var item = document.createElement('div');
            item.className = 'work-item';
            
            // ▼▼▼ 複数タグを裏側に保存 ▼▼▼
            item.dataset.tags = tagArray.join(',');
            
            item.style.animationDelay = (i * 0.05) + 's';
            
            if (w.url) {
                var a = document.createElement('a');
                a.href = w.url;
                a.target = '_blank';
                a.rel = 'noopener';
                a.innerHTML = inner;
                item.appendChild(a);
            } else {
                item.innerHTML = inner;
            }
            grid.appendChild(item);
        });
    });

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        
        var targetTag = btn.dataset.filter;
        document.querySelectorAll('.work-item').forEach(function(item) {
            // ▼▼▼ フィルター処理：設定されたタグの中に、クリックしたボタンのタグが含まれているかチェック ▼▼▼
            var itemTags = item.dataset.tags.split(',');
            item.dataset.hidden = (targetTag !== 'all' && !itemTags.includes(targetTag)) ? 'true' : 'false';
        });
    });
  });
</script></span>
  </footer>
  </main>
      </nav>
  </header>
</body></title>
  </head>
