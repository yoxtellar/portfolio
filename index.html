<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>よっと / yoxtellar</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
      <a class="logo" href="index.html">よっと / yoxtellar</a>
      <nav>
            <a href="index.html" id="nav-works">works</a>
            <a href="profile.html" id="nav-profile">profile</a>
            <a href="contact.html" id="nav-contact">contact</a>
      </nav>
  </header>

  <main>
      <div class="social-links",style="margin-top:80px;">
        <a href="https://x.com/yoxtellar">x</a>
        <a href="https://www.instagram.com/yox_life/">insta</a>
        <a href="https://soundcloud.com/yoxtellar">sc</a>
        <a href="https://yot-kun.bandcamp.com/">bc</a>
        <a href="hhttps://open.spotify.com/intl-ja/artist/5e5zxa27uEOct7mKeixo5d?si=jTUsv50OR1mW-pPBEhoYCQ&nd=1&dlsi=1a59251b1c974ff6">spotify</a>
        <a href="https://yot.fanbox.cc/">fanbox</a>
      </div>
      <div class="filters">
            <button class="filter-btn active" data-filter="all">all</button>
            <button class="filter-btn" data-filter="composer">composer</button>
            <button class="filter-btn" data-filter="live">live</button>
            <button class="filter-btn" data-filter="release">release</button>
            <button class="filter-btn" data-filter="engineering">engineering</button>
            
            <button class="filter-btn" data-filter="metaverse">metaverse</button>
            <button class="filter-btn" data-filter="other">other</button>
      </div>
      <div class="grid" id="worksGrid"></div>
  </main>

  <footer>
      <span>&copy; yoxtellar</span>
    <div class="social-links">
        <a href="https://x.com/yoxtellar">x</a>
        <a href="https://soundcloud.com/yoxtellar">sc</a>
        <a href="https://yot-kun.bandcamp.com/">bc</a>
        <a href="https://yot.fanbox.cc/">fb</a>
    </div>
  </footer>

<script>
  fetch('works.json')
    .then(function(r) { return r.json(); })
    .then(function(works) {
        // 1. 日付で新しい順（降順）に並び替え
        works.sort(function(a, b) {
            var timeA = a.date ? new Date(a.date.replace(/\./g, '/')).getTime() : 0;
            var timeB = b.date ? new Date(b.date.replace(/\./g, '/')).getTime() : 0;
            return timeB - timeA;
        });

        var grid = document.getElementById('worksGrid');
        
        // 既存の中身を一旦空にする（二重表示防止）
        grid.innerHTML = '';

        works.forEach(function(w, i) {
            // タグの処理（複数対応・小文字統一）
            var rawTags = Array.isArray(w.tag) ? w.tag : (w.tag ? w.tag.split(',') : ['other']);
            var cleanTags = rawTags.map(function(t) { return t.trim().toLowerCase(); });
            var tagLabel = cleanTags.map(function(t) { return t.replace('-', ' / '); }).join(', ');
            
            var dateHtml = w.date ? `<div class="work-date">${w.date}</div>` : '';
            var defaultImg = 'assets/images/yoxtellar_logo_A_reverse.png';
            var thumbSrc = w.thumb ? w.thumb : defaultImg;
            var description = w.description || 'No description available.';
            var linkHtml = w.url ? `<a href="${w.url}" target="_blank" rel="noopener" class="detail-link">View Project &rarr;</a>` : '';

            // アイテム要素の作成
            var item = document.createElement('div');
            item.className = 'work-item';
            item.dataset.tags = cleanTags.join(',');
            
            // アンビエントな出現ディレイ
            item.style.animationDelay = (i * 0.15 + 0.8) + 's';

            // 構造を流し込む（閉じタグミスを防ぐバッククォート記法）
            item.innerHTML = `
                <div class="work-trigger">
                    <div class="thumb-wrap">
                        <img src="${thumbSrc}" onerror="this.src='${defaultImg}'" alt="${w.title}" loading="lazy">
                        <div class="work-overlay"><span class="overlay-arrow">&darr;</span></div>
                    </div>
                    <div class="work-info">
                        <div class="work-meta"><span class="work-tag">${tagLabel}</span>${dateHtml}</div>
                        <div class="work-title">${w.title}</div>
                    </div>
                </div>
                <div class="work-detail">
                    <div class="detail-inner">
                        <div class="detail-text">${description}</div>
                        ${linkHtml}
                    </div>
                </div>
            `;
            
            grid.appendChild(item);

            // クリックイベント：自分を開き、他を閉じる
            item.querySelector('.work-trigger').addEventListener('click', function() {
                var isActive = item.classList.contains('is-active');
                
                // 全てのアクティブを解除
                document.querySelectorAll('.work-item').forEach(function(el) {
                    el.classList.remove('is-active');
                });
                
                // クリックしたものが閉じていれば開く
                if (!isActive) {
                    item.classList.add('is-active');
                    // 展開を待ってからスクロール
                    setTimeout(function() {
                        item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 400);
                }
            });
        });
    })
    .catch(function(err) {
        console.error("JSON読み込みエラー:", err);
    });

  // フィルターボタンの処理
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        
        var targetTag = btn.dataset.filter.toLowerCase();
        document.querySelectorAll('.work-item').forEach(function(item) {
            var itemTags = (item.dataset.tags || "").split(',');
            item.dataset.hidden = (targetTag !== 'all' && !itemTags.includes(targetTag)) ? 'true' : 'false';
            // フィルター時はアコーディオンを閉じる
            item.classList.remove('is-active');
        });
    });
  });
</script>
</body>
</html>
